services:
  client:
    ports:
      - "${CLIENT_HOST_PORT:-3000}:${CLIENT_CONTAINER_PORT:-3000}"
    environment:
      NODE_ENV: production
      REACT_APP_API_BASE_URL: ${REACT_APP_API_BASE_URL:-http://localhost:${SERVER_HOST_PORT:-5000}/api}
      REACT_APP_API_BASE_PATH: ${REACT_APP_API_BASE_PATH:-/api}

  server:
    ports:
      - "${SERVER_HOST_PORT:-5000}:${SERVER_CONTAINER_PORT:-5000}"
    environment:
      NODE_ENV: production
      PORT: ${SERVER_CONTAINER_PORT:-5000}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      CLIENT_APP_BASE_URL: ${CLIENT_APP_BASE_URL:-http://localhost:${CLIENT_HOST_PORT:-3000}}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:${CLIENT_HOST_PORT:-3000}}
