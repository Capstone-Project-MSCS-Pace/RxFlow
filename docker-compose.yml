services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: production
      args:
        REACT_APP_API_BASE_URL: ${REACT_APP_API_BASE_URL:-}
        REACT_APP_API_BASE_PATH: ${REACT_APP_API_BASE_PATH:-/api}
    # image: rxflow-client:latest
    container_name: rxflow-client
    env_file:
      - ./client/.env
    environment:
      NODE_ENV: production
      REACT_APP_API_BASE_URL: ${REACT_APP_API_BASE_URL:-}
      REACT_APP_API_BASE_PATH: ${REACT_APP_API_BASE_PATH:-/api}
      DEV_SERVER_PROXY_TARGET: ${DEV_SERVER_PROXY_TARGET:-http://server:5000}
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: production
    # image: rxflow-server:latest
    container_name: rxflow-server
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: production
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      CLIENT_APP_BASE_URL: ${CLIENT_APP_BASE_URL:-http://localhost:3000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:5000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: rxflow-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
