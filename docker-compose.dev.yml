services:
  client:
    build:
      target: dev
    command: npm start
    ports:
      - "${CLIENT_HOST_PORT:-3000}:${CLIENT_CONTAINER_PORT:-3000}"
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      WDS_SOCKET_PORT: "0"
      REACT_APP_API_BASE_URL: ${REACT_APP_API_BASE_URL:-}
      REACT_APP_API_BASE_PATH: ${REACT_APP_API_BASE_PATH:-/api}
      DEV_SERVER_PROXY_TARGET: ${DEV_SERVER_PROXY_TARGET:-http://server:5000}
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
    restart: unless-stopped

  server:
    build:
      target: dev
    command: npm run dev -- --legacy-watch
    ports: []
    environment:
      NODE_ENV: development
      PORT: ${SERVER_CONTAINER_PORT:-5000}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      CLIENT_APP_BASE_URL: ${CLIENT_APP_BASE_URL:-http://localhost:3000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    volumes:
      - ./server:/app
      - server_node_modules:/app/node_modules
    restart: unless-stopped

  redis:
    ports: []

volumes:
  client_node_modules:
  server_node_modules:
